<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vault Messenger v6.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #22d3ee; --bg: #020617; }
        body {
            background: radial-gradient(circle at top right, #083344, #020617, #000000);
            font-family: 'Outfit', sans-serif;
            color: #f1f5f9;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .app-name {
            background: linear-gradient(to bottom, #ffffff 30%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.3));
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neo-input {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid #1e293b;
        }
        #matrixCanvas { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div id="payModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-xl p-6">
        <div class="glass w-full max-w-sm p-8 rounded-[3rem] border-cyan-500/20 text-center shadow-2xl">
            <div id="methodSelect">
                <h2 class="text-xl font-black mb-6 uppercase tracking-widest text-cyan-400">Unlock Image</h2>
                <p class="text-[10px] text-slate-400 mb-6 uppercase font-bold tracking-[0.2em]">Fee: 5.00 BDT</p>
                <div class="space-y-4">
                    <button onclick="showDetails('bKash', '01774460656')" class="w-full bg-[#D12053] py-4 rounded-2xl font-black italic text-white active:scale-95 transition-transform">bKash</button>
                    <button onclick="showDetails('Nagad', '01774460656')" class="w-full bg-[#F7941D] py-4 rounded-2xl font-black italic text-white active:scale-95 transition-transform">Nagad</button>
                </div>
            </div>

            <div id="payDetails" class="hidden">
                <h2 id="providerName" class="text-3xl font-black mb-2 italic"></h2>
                <p class="text-xs text-slate-400 mb-4 uppercase font-bold tracking-widest">Send 5.00 BDT (Send Money) to:</p>
                <div class="bg-white/5 p-4 rounded-2xl mb-6 select-all font-mono text-xl tracking-[0.2em] border border-white/10 text-cyan-400">
                    <span id="personalNum"></span>
                </div>
                <input type="text" id="trxId" placeholder="Enter Transaction ID" class="w-full bg-black/50 border border-slate-700 p-4 rounded-xl text-center mb-4 outline-none focus:border-cyan-500 font-bold uppercase tracking-widest">
                <button onclick="verifyPayment()" class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black uppercase shadow-lg shadow-cyan-500/20">Verify & Decrypt</button>
            </div>
            
            <button onclick="closePay()" class="mt-8 text-[10px] text-slate-600 uppercase font-black tracking-widest hover:text-slate-400 transition-colors">Cancel</button>
        </div>
    </div>

    <div id="mainApp" class="w-full max-w-lg glass rounded-[3rem] p-8 md:p-12 relative overflow-hidden">
        <div class="flex flex-col items-center mb-10 text-center">
            <div class="w-16 h-16 bg-gradient-to-br from-cyan-400 to-blue-600 p-[1px] rounded-2xl mb-6">
                <div class="w-full h-full bg-[#020617] rounded-[15px] flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
            </div>
            <h1 class="app-name text-4xl font-black mb-1 uppercase tracking-tighter">VAULT MESSENGER</h1>
            <p class="text-[8px] tracking-[0.6em] text-slate-500 font-bold uppercase">v6.1 Privacy Protocol</p>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-8">
            <div class="bg-slate-950/50 p-2 rounded-2xl border border-slate-800 text-center">
                <label class="text-[7px] font-black text-cyan-500 uppercase block mb-1">Shift</label>
                <input type="number" id="shift" value="12" class="bg-transparent w-full text-center font-bold text-sm outline-none">
            </div>
            <label class="bg-slate-950/50 p-2 rounded-2xl border border-slate-800 text-center cursor-pointer">
                <label class="text-[7px] font-bold text-slate-500 uppercase block mb-1">Shadow</label>
                <span id="shadowStat" class="text-[9px] font-black text-cyan-400 uppercase">LOAD</span>
                <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="handleShadow(this)">
            </label>
            <button onclick="toggleSet('ghost')" id="ghostBtn" class="bg-slate-950/50 p-2 rounded-2xl border border-slate-800">
                <label class="text-[7px] font-bold text-slate-500 uppercase block mb-1">Ghost</label>
                <span id="ghostStat" class="text-[9px] font-black text-slate-400 uppercase">OFF</span>
            </button>
            <button onclick="aiObfuscate()" class="bg-slate-950/50 p-2 rounded-2xl border border-slate-800">
                <label class="text-[7px] font-bold text-purple-500 uppercase block mb-1">AI Agent</label>
                <span class="text-[9px] font-black text-slate-400 uppercase">DECOY</span>
            </button>
        </div>

        <textarea id="msgInput" placeholder="আপনার বার্তাটি লিখুন..." class="w-full neo-input rounded-[2rem] p-6 h-40 text-slate-200 outline-none text-lg resize-none mb-6"></textarea>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="run('enc')" class="bg-cyan-500 text-slate-950 font-black py-5 rounded-2xl active:scale-95 uppercase">Encrypt</button>
            <button onclick="run('dec')" class="bg-slate-800 text-white font-black py-5 rounded-2xl active:scale-95 uppercase">Decrypt</button>
        </div>

        <div id="resArea" class="hidden">
            <div class="bg-cyan-500/5 border border-cyan-500/10 rounded-[2rem] p-6">
                <div class="flex justify-between items-center mb-4">
                    <span id="resLabel" class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Output Matrix</span>
                    <button id="actionBtn" class="text-[10px] bg-white text-black px-4 py-1.5 rounded-full font-black uppercase">Action</button>
                </div>
                <p id="resText" class="text-xl font-medium text-white break-words mb-4 text-center"></p>
                <div id="imgBox" class="hidden rounded-xl overflow-hidden border border-cyan-500/30">
                    <img id="resImg" src="" class="w-full">
                </div>
            </div>
        </div>

        <footer class="mt-8 pt-6 border-t border-slate-900 text-center">
            <p class="text-[8px] text-slate-700 font-black uppercase tracking-[0.5em]">Bangladesh • 2026</p>
        </footer>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <script>
        let settings = { ghost: false, paid: false };
        let shadowData = null;
        let activeProvider = "";

        function toggleSet(type) {
            settings[type] = !settings[type];
            document.getElementById(type + 'Stat').innerText = settings[type] ? "ACTIVE" : "OFF";
            document.getElementById(type + 'Stat').style.color = settings[type] ? "#22d3ee" : "#94a3b8";
        }

        function aiObfuscate() {
            const input = document.getElementById('msgInput');
            if(!input.value) return;
            const decoys = ["বাজার থেকে আলু আর পেঁয়াজ নিয়ে এসো।", "কাল সকালে মিটিং আছে।", "ভাই, ১০ টায় ফোন দিও।"];
            input.value = decoys[Math.floor(Math.random() * decoys.length)];
        }

        function handleShadow(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    shadowData = e.target.result;
                    document.getElementById('shadowStat').innerText = "READY";
                    document.getElementById('shadowStat').style.color = "#ffffff";
                    settings.paid = false; 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- PAYMENT LOGIC ---
        function showDetails(provider, number) {
            activeProvider = provider;
            document.getElementById('methodSelect').classList.add('hidden');
            document.getElementById('payDetails').classList.remove('hidden');
            document.getElementById('providerName').innerText = provider;
            document.getElementById('personalNum').innerText = number;
            document.getElementById('providerName').style.color = (provider === 'bKash') ? '#D12053' : '#F7941D';
        }

        function verifyPayment() {
            const trx = document.getElementById('trxId').value;
            if(trx.length < 6) {
                alert("সঠিক Transaction ID দিন!");
                return;
            }
            alert("ভেরিফাই করা হচ্ছে...");
            setTimeout(() => {
                alert("পেমেন্ট সফল! ৫.০০ টাকা গ্রহণ করা হয়েছে।");
                settings.paid = true;
                closePay();
                run('dec');
            }, 1500);
        }

        function closePay() {
            document.getElementById('payModal').classList.add('hidden');
            document.getElementById('methodSelect').classList.remove('hidden');
            document.getElementById('payDetails').classList.add('hidden');
            document.getElementById('trxId').value = "";
        }

        // --- CORE RUN FUNCTION ---
        async function run(mode) {
            const input = document.getElementById('msgInput');
            const resArea = document.getElementById('resArea');
            const resText = document.getElementById('resText');
            const resImg = document.getElementById('resImg');
            const imgBox = document.getElementById('imgBox');
            const actionBtn = document.getElementById('actionBtn');
            let shift = parseInt(document.getElementById('shift').value) || 0;

            // Trigger payment ONLY for Image Decryption
            if (mode === 'dec' && shadowData && !settings.paid) {
                document.getElementById('payModal').classList.remove('hidden');
                return;
            }

            if (shadowData) {
                const img = new Image();
                img.src = shadowData;
                await new Promise(r => img.onload = r);
                const cvs = document.getElementById('matrixCanvas');
                const ctx = cvs.getContext('2d');
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0, 0, cvs.width, cvs.height);
                const px = data.data;
                let seed = shift;
                for (let i = 0; i < px.length; i += 4) {
                    px[i] = px[i] ^ (seed % 255);
                    px[i+1] = px[i+1] ^ ((seed * 2) % 255);
                    px[i+2] = px[i+2] ^ ((seed * 3) % 255);
                    seed = (seed * 16807) % 2147483647;
                }
                ctx.putImageData(data, 0, 0);
                const finalUrl = cvs.toDataURL("image/png");
                resText.innerText = mode === 'enc' ? "Shadow Matrix Created" : "Shadow Matrix Restored";
                resImg.src = finalUrl;
                imgBox.classList.remove('hidden');
                actionBtn.innerText = "SAVE";
                actionBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.href = finalUrl;
                    link.download = mode === 'enc' ? 'shadow.png' : 'restored.png';
                    link.click();
                };
            } 
            else if (input.value) {
                if(mode === 'dec') shift = -shift;
                const out = input.value.split('').map(c => String.fromCharCode(c.charCodeAt(0) + (c === ' ' ? 0 : shift))).join('');
                resText.innerText = out;
                imgBox.classList.add('hidden');
                actionBtn.innerText = "COPY";
                actionBtn.onclick = () => { navigator.clipboard.writeText(out); alert("Copied!"); };
            }

            resArea.classList.remove('hidden');
            if(settings.ghost) { input.value = ''; shadowData = null; document.getElementById('shadowStat').innerText = "LOAD"; }
        }
    </script>
</body>
</html>
