<div id="payModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-2xl p-6">
    <div class="glass w-full max-w-sm p-8 rounded-[3rem] border-cyan-500/20 text-center">
        <div id="methodSelect">
            <h2 class="text-xl font-black mb-6 uppercase tracking-tighter text-cyan-400">Select Payment</h2>
            <div class="space-y-4">
                <button onclick="showDetails('bKash', '01774460656')" class="w-full bg-[#D12053] py-4 rounded-2xl font-black italic">bKash</button>
                <button onclick="showDetails('Nagad', '01774460656')" class="w-full bg-[#F7941D] py-4 rounded-2xl font-black italic">Nagad</button>
            </div>
        </div>

        <div id="payDetails" class="hidden">
            <h2 id="providerName" class="text-2xl font-black mb-2 italic"></h2>
            <p class="text-sm text-slate-400 mb-4">Send <span class="text-white font-bold">5.00 BDT</span> to:</p>
            <div class="bg-white/10 p-4 rounded-2xl mb-6 select-all font-mono text-xl tracking-widest border border-white/5">
                <span id="personalNum"></span>
            </div>
            <input type="text" id="trxId" placeholder="Enter Transaction ID" class="w-full bg-black/50 border border-slate-700 p-4 rounded-xl text-center mb-4 outline-none focus:border-cyan-500">
            <button onclick="verifyPayment()" class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black uppercase">Verify & Unlock</button>
        </div>
        
        <button onclick="closePay()" class="mt-6 text-[9px] text-slate-600 uppercase font-black">Cancel</button>
    </div>
</div>

<script>
    let activeProvider = "";
    
    function showDetails(provider, number) {
        activeProvider = provider;
        document.getElementById('methodSelect').classList.add('hidden');
        document.getElementById('payDetails').classList.remove('hidden');
        document.getElementById('providerName').innerText = provider;
        document.getElementById('personalNum').innerText = number;
        // Set brand colors
        document.getElementById('providerName').style.color = (provider === 'bKash') ? '#D12053' : '#F7941D';
    }

    function verifyPayment() {
        const trx = document.getElementById('trxId').value;
        if(trx.length < 8) {
            alert("সঠিক Transaction ID দিন!");
            return;
        }

        // Simulating verification - In a real app, you'd check this via a backend
        alert(`${activeProvider} পেমেন্ট ভেরিফাই করা হচ্ছে...`);
        
        setTimeout(() => {
            alert("পেমেন্ট সফল! ৫.০০ টাকা গ্রহণ করা হয়েছে।");
            settings.paid = true;
            document.getElementById('payModal').classList.add('hidden');
            run('dec'); // Trigger decryption
            
            // Reset for next time
            document.getElementById('methodSelect').classList.remove('hidden');
            document.getElementById('payDetails').classList.add('hidden');
            document.getElementById('trxId').value = "";
        }, 2000);
    }

    function closePay() {
        document.getElementById('payModal').classList.add('hidden');
        document.getElementById('methodSelect').classList.remove('hidden');
        document.getElementById('payDetails').classList.add('hidden');
    }

    // ... Keep the rest of your original run() and handleShadow() functions ...
</script>
