<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Messenger v6.1 | Privacy Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        #matrixCanvas { display: none; }
        .glow-text { text-shadow: 0 0 15px rgba(34, 211, 238, 0.5); }
        .lock-glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="payModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-6">
        <div class="glass w-full max-w-sm p-8 rounded-[3rem] text-center border-cyan-500/20">
            <div id="methodSelect">
                <h2 class="text-xl font-black mb-6 text-cyan-400 uppercase italic">SHADOW LOCKED</h2>
                <div class="space-y-3">
                    <button onclick="showDetails('bKash', '01774460656')" class="w-full bg-[#D12053] py-4 rounded-2xl font-bold italic text-white active:scale-95 transition-transform">bKash</button>
                    <button onclick="showDetails('Nagad', '01774460656')" class="w-full bg-[#F7941D] py-4 rounded-2xl font-bold italic text-white active:scale-95 transition-transform">Nagad</button>
                </div>
            </div>
            <div id="payDetails" class="hidden text-center">
                <p class="text-[10px] text-slate-400 mb-2 uppercase font-black tracking-widest">Send 5.00 BDT to:</p>
                <div id="personalNum" class="text-2xl font-mono text-cyan-400 mb-6 bg-white/5 p-4 rounded-xl border border-white/5"></div>
                <input type="text" id="trxId" placeholder="ENTER TRX ID" class="w-full bg-black/50 border border-slate-700 p-4 rounded-xl text-center mb-4 uppercase font-bold outline-none focus:border-cyan-500">
                <button onclick="submitTrx()" class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black uppercase">VERIFY ACCESS</button>
                <div id="waitMsg" class="hidden mt-4">
                    <p class="text-[10px] text-yellow-500 animate-pulse font-bold uppercase tracking-widest">Verifying Shadow Protocol...</p>
                </div>
            </div>
            <button onclick="closePay()" class="mt-8 text-[10px] text-slate-600 font-bold uppercase tracking-widest">Abort</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden fixed inset-0 z-[60] bg-[#020617] p-6 overflow-y-auto">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-10 border-b border-white/5 pb-5">
                <h1 class="text-2xl font-black text-cyan-400 uppercase italic">Admin Terminal</h1>
                <button onclick="closeAdmin()" class="bg-red-500/20 text-red-500 px-6 py-2 rounded-full text-xs font-bold uppercase">Exit</button>
            </div>
            <div id="requestList" class="space-y-4"></div>
        </div>
    </div>

    <div id="appUI" class="w-full max-w-[440px] glass rounded-[3.5rem] p-10 relative shadow-2xl border-white/5">
        
        <div class="flex justify-center mb-6">
            <div class="w-14 h-14 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center lock-glow">
                <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic glow-text">VAULT MESSENGER</h1>
            <p class="text-[7px] tracking-[0.8em] text-cyan-500 font-black uppercase mt-1">v6.1 Privacy Protocol</p>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-8">
            <div class="bg-black/40 p-3 rounded-2xl border border-white/5 text-center">
                <span class="text-[6px] block text-slate-500 font-black mb-1 uppercase">Shift</span>
                <input type="number" id="shift" value="12" class="bg-transparent w-full text-center font-black text-cyan-400 outline-none text-[10px]">
            </div>
            <label class="bg-black/40 p-3 rounded-2xl border border-white/5 text-center cursor-pointer">
                <span class="text-[6px] block text-slate-500 font-black mb-1 uppercase">Shadow</span>
                <span id="shadowStat" class="font-black text-white uppercase text-[8px]">READY</span>
                <input type="file" id="imgInput" class="hidden" onchange="handleShadow(this)">
            </label>
            <div class="bg-black/40 p-3 rounded-2xl border border-white/5 text-center">
                <span class="text-[6px] block text-slate-500 font-black mb-1 uppercase">Ghost</span>
                <span class="text-[8px] font-black text-red-500 uppercase">OFF</span>
            </div>
            <div class="bg-black/40 p-3 rounded-2xl border border-white/5 text-center">
                <span class="text-[6px] block text-slate-500 font-black mb-1 uppercase tracking-tighter">AI Agent</span>
                <span class="text-[8px] font-black text-cyan-500 uppercase">DECOY</span>
            </div>
        </div>

        <textarea id="msgInput" placeholder="আপনার বার্তাটি লিখুন..." class="w-full bg-black/40 border border-slate-800/50 rounded-[2.5rem] p-6 h-40 mb-8 outline-none focus:border-cyan-500/30 text-base text-slate-300 resize-none"></textarea>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="run('enc')" class="bg-cyan-500 text-black py-5 rounded-3xl font-black uppercase tracking-widest active:scale-95 transition-transform text-sm shadow-lg shadow-cyan-500/20">Encrypt</button>
            <button onclick="run('dec')" class="bg-[#1e293b] text-white py-5 rounded-3xl font-black uppercase tracking-widest active:scale-95 transition-transform text-sm border border-white/5">Decrypt</button>
        </div>

        <div id="resArea" class="hidden mt-8 p-6 bg-cyan-500/5 rounded-[2.5rem] border border-cyan-500/10">
            <div class="flex justify-between items-center mb-4">
                <span id="resLabel" class="text-[8px] font-black text-cyan-400 uppercase tracking-[0.2em]">OUTPUT MATRIX</span>
                <button id="copyBtn" class="text-[8px] bg-white text-black px-4 py-1.5 rounded-full font-black uppercase">SAVE</button>
            </div>
            <p id="resText" class="text-center break-words mb-4 text-white text-lg font-medium"></p>
            <div id="imgBox" class="hidden rounded-3xl overflow-hidden border border-cyan-500/20">
                <img id="resImg" class="w-full">
            </div>
        </div>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhTOWBvfqDvmDW03FOF5OqEq8HRv5dMME",
            authDomain: "vault-messenger-fcb60.firebaseapp.com",
            projectId: "vault-messenger-fcb60",
            storageBucket: "vault-messenger-fcb60.firebasestorage.app",
            messagingSenderId: "821728049314",
            appId: "1:821728049314:web:54d5b101d52b4e89613ffb",
            databaseURL: "https://vault-messenger-fcb60-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let shadowData = null;
        let settings = { paid: false, currentTrxKey: null };

        function handleShadow(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                shadowData = e.target.result; 
                document.getElementById('shadowStat').innerText = "READY"; 
                document.getElementById('shadowStat').classList.add('text-cyan-400');
                settings.paid = false; 
            };
            reader.readAsDataURL(input.files[0]);
        }

        function showDetails(provider, num) {
            document.getElementById('methodSelect').classList.add('hidden');
            document.getElementById('payDetails').classList.remove('hidden');
            document.getElementById('personalNum').innerText = num;
        }

        function submitTrx() {
            const trx = document.getElementById('trxId').value.trim();
            if(trx.length < 8) return alert("Invalid TRX ID");
            const newRef = db.ref('payments').push();
            settings.currentTrxKey = newRef.key;
            newRef.set({ trx: trx, status: 'pending', timestamp: Date.now() });
            document.getElementById('waitMsg').classList.remove('hidden');
            db.ref('payments/' + settings.currentTrxKey).on('value', (s) => {
                if(s.val()?.status === 'approved') {
                    settings.paid = true; closePay(); run('dec');
                }
            });
        }

        function openAdmin() {
            document.getElementById('adminPanel').classList.remove('hidden');
            db.ref('payments').on('value', (s) => {
                const list = document.getElementById('requestList');
                list.innerHTML = "";
                s.forEach((c) => {
                    const d = c.val();
                    if(d.status === 'pending') {
                        list.innerHTML += `<div class="glass p-6 rounded-[2rem] flex justify-between items-center border-white/5">
                            <div><p class="font-black text-cyan-400 uppercase italic text-lg tracking-wider">${d.trx}</p><p class="text-[8px] text-slate-500 font-bold uppercase">${new Date(d.timestamp).toLocaleTimeString()}</p></div>
                            <button onclick="approvePay('${c.key}')" class="bg-cyan-500 text-black px-6 py-3 rounded-2xl text-[10px] font-black uppercase">Approve</button>
                        </div>`;
                    }
                });
            });
        }

        function approvePay(key) { db.ref('payments/' + key).update({ status: 'approved' }); }
        function closeAdmin() { document.getElementById('adminPanel').classList.add('hidden'); }
        function closePay() { document.getElementById('payModal').classList.add('hidden'); }

        async function run(mode) {
            const input = document.getElementById('msgInput');
            if(input.value.trim() === "/admin") { openAdmin(); input.value = ""; return; }
            const resArea = document.getElementById('resArea');
            const resText = document.getElementById('resText');
            const resImg = document.getElementById('resImg');
            const imgBox = document.getElementById('imgBox');
            const resLabel = document.getElementById('resLabel');
            let shift = parseInt(document.getElementById('shift').value) || 0;

            if (mode === 'dec' && shadowData && !settings.paid) {
                document.getElementById('payModal').classList.remove('hidden');
                return;
            }

            if (shadowData) {
                const img = new Image();
                img.src = shadowData;
                await new Promise(r => img.onload = r);
                const cvs = document.getElementById('matrixCanvas');
                const ctx = cvs.getContext('2d');
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0, 0, cvs.width, cvs.height);
                const px = data.data;
                let seed = shift;
                for (let i = 0; i < px.length; i += 4) {
                    px[i] ^= (seed % 255);
                    px[i+1] ^= ((seed * 2) % 255);
                    px[i+2] ^= ((seed * 3) % 255);
                    seed = (seed * 16807) % 2147483647;
                }
                ctx.putImageData(data, 0, 0);
                const finalUrl = cvs.toDataURL("image/png");
                resImg.src = finalUrl;
                resText.innerText = mode === 'enc' ? "Shadow Matrix Created" : "Shadow Matrix Restored";
                resLabel.innerText = "SHADOW RESULT";
                imgBox.classList.remove('hidden');
                document.getElementById('copyBtn').onclick = () => {
                    const l = document.createElement('a'); l.href = finalUrl; l.download = "shadow.png"; l.click();
                };
            } else if (input.value) {
                if(mode === 'dec') shift = -shift;
                const out = input.value.split('').map(c => String.fromCharCode(c.charCodeAt(0) + (c === ' ' ? 0 : shift))).join('');
                resText.innerText = out;
                resLabel.innerText = "OUTPUT MATRIX";
                imgBox.classList.add('hidden');
                document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(out); alert("SAVED TO CLIPBOARD"); };
            }
            resArea.classList.remove('hidden');
        }
    </script>
</body>
</html>
